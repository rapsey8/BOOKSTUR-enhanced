<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | SSCR-C Bookstore</title>
    <link rel="stylesheet" href="cart-style.css">
</head>
<body>

    <nav>
        <div class="logo">
            <h2 style="font-family: 'OPTIEngraversOldEnglish'; font-size: 25px; color: rgb(255, 0, 13); text-shadow: 1px 1px 0 black, 1px 1px 0 black, 1px 1px 0 rgb(255, 255, 255);">
                <img src="SSCRLogo1.png" width="50" height="50" style="vertical-align: middle;"> 
                SSCR-C Bookstore
            </h2>
        </div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="uniform.html">Products</a></li>
            <li><a href="cart.html" class="active">Cart</a></li>
        </ul>
    </nav>

    <main class="cart-container">
        <h1>Your Shopping Cart</h1>
        <div class="cart-wrapper">
            <div class="cart-items">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Product</th><th>Size</th><th>Price</th><th>Qty</th><th>Total</th><th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="cart-body">
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 50px; color: #888;">
                                Your cart is currently empty.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row"><span>Subtotal</span><span>₱0.00</span></div>
                <hr>
                <div class="summary-row total"><span>Grand Total</span><span>₱0.00</span></div>
                <button class="checkout-btn" onclick="openModal()">PROCEED TO CHECKOUT</button>
            </div>
        </div>
    </main>

    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color: var(--primary-red); border-bottom: 2px solid var(--gold);">Checkout Details</h2>
            
            <form id="checkoutForm">
                <div class="form-group">
                    <h3>1. Claiming Method</h3>
                    <label><input type="radio" name="delivery" value="pickup" checked> School Pickup (Free)</label><br>
                    <label><input type="radio" name="delivery" value="deliver"> Home Delivery (+₱50.00)</label>
                </div>

                <div class="form-group">
                    <h3>2. Payment Method</h3>
                    <div class="payment-options">
                        <label class="pay-item"><input type="radio" name="payment" value="gcash"> GCash</label>
                        <label class="pay-item"><input type="radio" name="payment" value="maya"> Maya</label>
                        <label class="pay-item"><input type="radio" name="payment" value="debit"> Debit Card</label>
                        <label class="pay-item"><input type="radio" name="payment" value="otc"> Cashier (OTC)</label>
                    </div>
                </div>

                <button type="button" class="confirm-btn" onclick="processOrder()">CONFIRM ORDER</button>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById("checkoutModal").style.display = "block"; }
        function closeModal() { document.getElementById("checkoutModal").style.display = "none"; }
        function processOrder() {
            alert("Order Confirmed! Thank you for choosing SSCR-C Bookstore.");
            window.location.href = "home.html";
        }
        // Close modal when clicking outside
        window.onclick = function(event) {
            let modal = document.getElementById("checkoutModal");
            if (event.target == modal) { closeModal(); }
        }
    </script>

</body>
</html>
